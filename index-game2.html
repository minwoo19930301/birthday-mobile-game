<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>CHAEEUN Birthday Castle - game2</title>
    <link rel="stylesheet" href="./style.css?v=castleline7" />
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  </head>
  <body>
    <main id="app">
      <section id="game-root"></section>

      <section id="hud-layer">
        <div id="guide-badge">중세 마을길 - 성으로 이동</div>
        <button id="talk-btn" type="button" aria-label="NPC에게 말 걸기">말 걸기</button>
        <button id="jump-btn" type="button" aria-label="점프">점프</button>

        <div id="joystick-base" aria-hidden="true">
          <div id="joystick-stick"></div>
        </div>
      </section>

      <div id="dialogue-overlay" class="hidden"></div>

      <section id="dialogue-panel" class="hidden" aria-live="polite">
        <div class="portrait-wrap">
          <img id="npc-portrait" src="./assets/portraits/ariel.png" alt="NPC portrait" />
        </div>

        <div class="dialogue-wrap">
          <div class="name-row">
            <div id="npc-nameplate">NPC</div>
            <div id="npc-subtitle">축하해요</div>
          </div>

          <p id="dialogue-text"></p>

          <div class="dialogue-actions">
            <button id="next-line-btn" type="button">다음</button>
          </div>
        </div>
      </section>

      <section id="ending-panel" class="hidden" aria-live="polite">
        <div class="ending-card">
          <h2>HAPPY BIRTHDAY CHAEEUN</h2>

          <div class="ending-visuals">
            <div class="ending-photo-box cake-box single-cake">
              <img id="cake-photo" src="./assets/portraits/cake-placeholder.svg" alt="cake" />
            </div>
          </div>

          <p id="ending-text">채은을 위한 마지막 생일 선물.</p>
          <button id="ending-close-btn" type="button">산책 계속하기</button>
        </div>
      </section>
    </main>

    <script src="./game2.js?v=castleline7"></script>
  </body>
</html>
